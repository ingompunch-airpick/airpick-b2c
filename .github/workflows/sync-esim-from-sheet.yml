name: Sync eSIM from Google Sheet and deploy

on:
  schedule:
    # 매시 정각 (UTC) — 한국 시간 기준 약 1시간마다
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: sync-esim-deploy
  cancel-in-progress: true

jobs:
  sync-deploy:
    runs-on: ubuntu-latest
    if: hashFiles('data/esim/sheets.json') != ''
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci
      - run: npm run sync:esim
      - run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: airpick-reservation
          channelId: live
          target: airpick-b2c
