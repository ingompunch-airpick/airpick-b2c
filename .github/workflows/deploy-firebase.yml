name: Deploy B2C to Firebase Hosting

on:
  push:
    branches:
      - main
  schedule:
    # 매시 정각 (UTC) — 시트 가격 변경 시 자동 sync + 배포
    - cron: '0 * * * *'
  workflow_dispatch:

concurrency:
  group: deploy-firebase-hosting
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Sync eSIM offers from Google Sheet
        if: github.event_name != 'push' && hashFiles('data/esim/sheets.json') != ''
        run: npm run sync:esim

      - run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: airpick-reservation
          channelId: live
          target: airpick-b2c
